  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaibhavi | Web Developer</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</head>
<body>

<header class="nav">
    <h2>Vaibhavi</h2>
    <div>
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="scrollToContact()">Hire Me</button>
    </div>
</header>

<section class="hero">
    <h1>Build Modern Websites</h1>
    <p>Clean, fast & responsive design</p>
    <button onclick="scrollToContact()">Get Started</button>
</section>

<section>
    <h2>Services</h2>
    <div class="grid">
        <div class="card">Website Design</div>
        <div class="card">Landing Pages</div>
        <div class="card">UI Design</div>
    </div>
</section>

<section>
    <h2>Pricing</h2>
    <div class="grid">
        <div class="card"><h3>Basic</h3><p>₹499</p></div>
        <div class="card"><h3>Standard</h3><p>₹999</p></div>
        <div class="card"><h3>Premium</h3><p>₹1999</p></div>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <form id="form">
        <input type="text" name="user_name" placeholder="Name" required>
        <input type="email" name="user_email" placeholder="Email" required>
        <textarea name="message" placeholder="Message"></textarea>
        <button>Send Message</button>
    </form>
    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 Vaibhavi</p>
</footer>

<script src="script.js"></script>
</body>
                                       </html>
